<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIN TO WIN</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="mega-background"><h1>$1,000,000</h1></div>
    <div id="money-rain" class="money-rain-container"></div>

    <main class="casino-wrapper">
        <h2 class="target-title">TARGET: $1,000</h2>
        <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>

        <div class="cabinet">
            <h1>SPIN TO WIN </h1>
            <div class="balance-box">BALANCE: $<span id="balance">100</span></div>
            <div id="debt-box" class="debt-box"></div>

            <div class="reels">
                <div class="slot" id="r1" onclick="toggleHold(0)">🍎</div>
                <div class="slot" id="r2" onclick="toggleHold(1)">🍋</div>
                <div class="slot" id="r3" onclick="toggleHold(2)">🍒</div>
            </div>
            
            <P>CLICK ITEM TO HOLD -10 TO THE BALANCE</P>

            <button class="casino-btn main-btn" onclick="spin()">SPIN ($10)</button>
            <button class="casino-btn loan-btn" onclick="takeLoan()">BORROW $50</button>
            <button class="casino-btn reset-btn" onclick="location.reload()">RESET</button>
            
            <div class="high-scores">
                <h3>TOP 5 FASTEST</h3>
                <ol id="score-list"></ol>
            </div>
            <p class="creator">BY: JOHN LORENZO AUSTRIA</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
