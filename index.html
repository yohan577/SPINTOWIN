<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }

        /* The Overlay */
        .age-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }

        .modal-content {
            background: #222;
            padding: 40px;
            border-radius: 8px;
            max-width: 400px;
            border: 1px solid #444;
        }

        h2 { margin-top: 0; color: #ffcc00; }

        .btn-group { margin-top: 25px; }

        button {
            padding: 10px 25px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn-yes { background: #28a745; color: white; }
        .btn-no { background: #dc3545; color: white; }
        
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="age-overlay" id="ageModal">
        <div class="modal-content">
            <h2>Age Verification</h2>
            <p>You must be <strong>18 years of age or older</strong> to enter this site. Please confirm your age.</p>
            <div class="btn-group">
                <button class="btn-yes" onclick="confirmAge()">I am 18 or older</button>
                <button class="btn-no" onclick="denyAccess()">I am under 18</button>
            </div>
        </div>
    </div>

 <script>
    function confirmAge() {
        // This tells the browser to navigate to your next page
        window.location.href = "main.html";
    }

    function denyAccess() {
        // Redirect minors away from your site
        window.location.href = "index.html";
    }
</script>

</body>
</html>
